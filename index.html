<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Anonymous Praise Board</title>
</head>
<body>

<h1>💖 Praise Board (GitHub Only)</h1>

<input id="image" placeholder="Image URL (use Imgur)" />
<br><br>
<input id="caption" placeholder="Caption" />
<br><br>
<button onclick="post()">Post</button>

<hr>

<div id="posts"></div>

<script>
const OWNER = "YOUR_USERNAME";
const REPO = "praise-board";
const TOKEN = "YOUR_GITHUB_TOKEN";

const phrases = [
  "Way to go! 😊",
  "Keep it up! 💪",
  "Right path! 🚀",
  "You rock! 🤘",
  "Amazing! ❤️"
];

async function post() {
  const image = document.getElementById("image").value;
  const caption = document.getElementById("caption").value;

  const body = `![img](${image})\n\n${caption}`;

  await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/issues`, {
    method: "POST",
    headers: {
      Authorization: `token ${TOKEN}`,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      title: "New Post",
      body: body
    })
  });

  load();
}

async function load() {
  const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/issues`);
  const data = await res.json();

  const container = document.getElementById("posts");
  container.innerHTML = "";

  data.forEach(issue => {
    const div = document.createElement("div");

    div.innerHTML = `
      <div>${issue.body}</div>
      ${phrases.map(p => `<button onclick="react(${issue.number}, '${p}')">${p}</button>`).join("")}
      <hr>
    `;

    container.appendChild(div);
  });
}

async function react(issueNumber, phrase) {
  await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/issues/${issueNumber}/reactions`, {
    method: "POST",
    headers: {
      Authorization: `token ${TOKEN}`,
      Accept: "application/vnd.github+json"
    },
    body: JSON.stringify({
      content: "heart"
    })
  });
}

load();
</script>

</body>
</html>
